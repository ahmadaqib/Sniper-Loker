version: '3'

services:
  goravel:
    build:
      context: .
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: loker_radar
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    restart: always
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: always

volumes:
  mongo_data:
